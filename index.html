<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewer-fit=cover">
<title>عقاري PRO — إدارة العقارات والإيجارات</title>
<meta name="theme-color" content="#070a12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#070a12; --panel:#10151f; --panel-2:#161c2b; --line:#232a3d;
  --text:#eef1f8; --muted:#7d8aa8; --accent:#6d5ef0; --accent-2:#d4af6a;
  --accent-grad:linear-gradient(135deg,#6d5ef0,#8b6ff5);
  --danger:#ff6b6b; --ok:#34d399; --warn:#f5c451;
  --mono:'JetBrains Mono',monospace; --arabic:'IBM Plex Sans Arabic',sans-serif; --serif:'Cormorant Garamond',serif;
  --radius:16px;
}
[data-theme="light"]{
  --bg:#f4f5fa; --panel:#ffffff; --panel-2:#f0f1f7; --line:#e3e5ef;
  --text:#161a26; --muted:#6b7290;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--text); font-family:var(--arabic);
  padding-bottom:104px; -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font-family:inherit; color:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

/* ---------- Top bar ---------- */
#topbar{
  position:sticky; top:0; z-index:20; background:rgba(7,10,18,.86);
  padding:16px 18px 14px; position:relative;
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
}
[data-theme="light"] #topbar{ background:rgba(244,245,250,.86); }
#topbar::after{
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--accent-2), transparent); opacity:.5;
}
.topbar-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.brand{display:flex; align-items:center; gap:12px; min-width:0;}
.brand-mark{
  flex-shrink:0; width:44px; height:44px; border-radius:50%;
  border:1.5px solid rgba(212,175,106,.55);
  background:radial-gradient(circle at 32% 24%, #2a2350, #0f1220 72%);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:20px; font-weight:700; color:#e9d9a8;
  box-shadow:0 6px 18px rgba(109,94,240,.25);
}
.brand-text{display:flex; flex-direction:column; line-height:1.28; min-width:0;}
.brand-name{font-family:var(--serif); font-size:21px; font-weight:700; display:flex; align-items:center; gap:7px; letter-spacing:.01em;}
.brand-pro{
  font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.07em;
  color:var(--accent-2); border:1px solid rgba(212,175,106,.45); background:rgba(212,175,106,.08);
  padding:2px 6px; border-radius:5px;
}
.brand-org{font-size:11px; color:var(--muted); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:var(--mono); letter-spacing:.03em;}
.topbar-actions{display:flex; align-items:center; gap:8px; flex-shrink:0;}
.role-chip{
  width:36px; height:36px; border-radius:50%; background:var(--panel); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer;
}
.role-chip:active{transform:scale(.94);}
.screen-strip{
  margin-top:13px; padding-top:12px; border-top:1px solid var(--line);
  font-size:13px; display:flex; align-items:center; gap:7px; font-weight:700;
}
.screen-strip::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--accent-2); flex-shrink:0;}
.screen-strip .dot{color:var(--muted); font-weight:400;}
.screen-strip #screenSub{color:var(--muted); font-weight:400; font-family:var(--mono); font-size:11.5px;}
.icon-btn{
  width:38px;height:38px;border-radius:12px; background:var(--panel);
  border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer;
}
.icon-btn:active{transform:scale(.94);}

/* ---------- Layout ---------- */
main{max-width:640px; margin:0 auto; padding:18px;}
.card{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px; margin-bottom:14px; box-shadow:0 14px 30px -18px rgba(0,0,0,.6);
}
.section-title{font-size:12.5px; color:var(--muted); font-family:var(--mono); text-transform:uppercase; letter-spacing:.08em; margin:22px 4px 11px; display:flex; align-items:center; gap:6px;}
.section-title:first-child{margin-top:0;}

/* ---------- Dashboard stats ---------- */
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
.stat{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px; box-shadow:0 14px 30px -18px rgba(0,0,0,.6);
}
.stat .ic-badge{
  width:30px; height:30px; border-radius:9px; background:rgba(109,94,240,.14); color:var(--accent);
  display:flex; align-items:center; justify-content:center; font-size:14.5px; margin-bottom:10px;
}
.stat .n{font-family:var(--mono); font-size:22px; font-weight:700; color:var(--text);}
.stat .l{font-size:12px; color:var(--muted); margin-top:4px;}
.stat.warn .ic-badge{background:rgba(255,107,107,.14); color:var(--danger);}
.stat.warn .n{color:var(--danger);}
.stat.gold .ic-badge{background:rgba(212,175,106,.16); color:var(--accent-2);}
.stat.gold .n{color:var(--accent-2);}

/* ---------- Lists ---------- */
.list-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:13px 4px; border-bottom:1px solid var(--line); cursor:pointer;
}
.list-row:last-child{border-bottom:none;}
.list-row:active{background:var(--panel-2);}
.list-row .main{min-width:0;}
.list-row .t{font-size:14.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.list-row .s{font-size:12.5px; color:var(--muted); margin-top:2px;}
.badge{
  font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:999px;
  white-space:nowrap; border:1px solid transparent;
}
.b-green{background:rgba(52,211,153,.13); color:var(--ok); border-color:rgba(52,211,153,.3);}
.b-red{background:rgba(255,107,107,.13); color:var(--danger); border-color:rgba(255,107,107,.3);}
.b-yellow{background:rgba(245,196,81,.14); color:var(--warn); border-color:rgba(245,196,81,.3);}
.b-gray{background:rgba(125,138,168,.13); color:var(--muted); border-color:rgba(125,138,168,.28);}
.b-teal{background:rgba(109,94,240,.14); color:var(--accent); border-color:rgba(109,94,240,.32);}

.empty{text-align:center; padding:40px 20px; color:var(--muted); font-size:13.5px;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:var(--accent-grad); color:#fff; font-weight:700; font-size:14px;
  border:none; border-radius:12px; padding:13px 18px; cursor:pointer; width:100%;
  box-shadow:0 10px 24px -10px rgba(109,94,240,.55);
}
.btn:active{transform:scale(.98);}
.btn.secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--line); font-weight:600; box-shadow:none;}
.btn.danger{background:rgba(255,107,107,.13); color:var(--danger); border:1px solid rgba(255,107,107,.35); box-shadow:none;}
.btn.small{width:auto; padding:9px 14px; font-size:13px;}
.btn-row{display:flex; gap:8px; margin-top:14px;}
.btn-row .btn{flex:1;}

.fab{
  position:fixed; bottom:114px; left:18px; z-index:15;
  width:54px; height:54px; border-radius:50%; background:var(--accent-grad);
  color:#fff; font-size:25px; border:none; box-shadow:0 12px 28px -8px rgba(109,94,240,.6);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}

/* ---------- Search ---------- */
.search-box{
  display:flex; align-items:center; gap:8px; background:var(--panel);
  border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:14px;
}
.search-box input{background:none; border:none; outline:none; flex:1; font-size:14px;}

/* ---------- Forms ---------- */
.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; color:var(--muted); margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:11px;
  padding:11px 12px; font-size:14.5px; outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical; min-height:70px;}
.field .req{color:var(--danger);}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:50;
  display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(2px);
}
.modal-backdrop.center{align-items:center; padding:16px;}
.modal{
  background:var(--bg); width:100%; max-width:640px; max-height:92vh; overflow-y:auto;
  border-radius:22px 22px 0 0; padding:22px 20px calc(20px + env(safe-area-inset-bottom));
  border:1px solid var(--line); border-bottom:none; box-shadow:0 -20px 50px rgba(0,0,0,.4);
}
.modal-backdrop.center .modal{border-radius:18px; padding:22px; border-bottom:1px solid var(--line);}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
.modal-head h3{font-family:var(--serif); font-size:19px; font-weight:700;}

/* ---------- Toast ---------- */
#toast{
  position:fixed; bottom:126px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:11px 20px; border-radius:999px; font-size:13.5px; z-index:80; opacity:0;
  transition:.25s; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.3);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- Bottom nav (floating) ---------- */
#bottomnav{
  position:fixed; left:14px; right:14px; bottom:calc(12px + env(safe-area-inset-bottom));
  z-index:30; background:rgba(16,21,31,.92); border:1px solid var(--line); border-radius:22px;
  display:flex; padding:6px; box-shadow:0 18px 40px -14px rgba(0,0,0,.6);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
}
[data-theme="light"] #bottomnav{ background:rgba(255,255,255,.92); }
.nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; padding:9px 2px; font-size:10.5px; color:var(--muted); cursor:pointer;
  border-radius:15px; transition:background .15s;
}
.nav-btn .ic{font-size:19px;}
.nav-btn.active{color:var(--text); background:linear-gradient(135deg, rgba(109,94,240,.22), rgba(139,111,245,.10));}

.qr-box{display:flex; justify-content:center; padding:10px 0;}
.notice{
  background:rgba(250,204,21,.1); border:1px solid rgba(250,204,21,.3); color:var(--warn);
  border-radius:10px; padding:11px 13px; font-size:12.5px; margin-bottom:14px; line-height:1.6;
}
.kv{display:flex; justify-content:space-between; font-size:13.5px; padding:8px 0; border-bottom:1px dashed var(--line);}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--muted);}
.tabbar{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto;}
.tabbar button{
  background:var(--panel-2); border:1px solid var(--line); color:var(--muted);
  padding:8px 14px; border-radius:999px; font-size:12.5px; white-space:nowrap; cursor:pointer;
}
.tabbar button.active{background:var(--accent-grad); color:#fff; border-color:transparent; font-weight:700;}
</style>
</head>
<body data-theme="dark">

<div id="topbar">
  <div class="topbar-row">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">ع</div>
      <div class="brand-text">
        <div class="brand-name">عقاري<span class="brand-pro">PRO</span></div>
        <div class="brand-org" id="orgNameLabel">—</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="App.openSearch()" aria-label="بحث">🔎</button>
      <button class="role-chip" id="roleChip" onclick="App.nav('settings')" title="الدور الحالي"></button>
    </div>
  </div>
  <div class="screen-strip">
    <span id="screenLabel">لوحة التحكم</span>
    <span class="dot">·</span>
    <span id="screenSub"></span>
  </div>
</div>

<main id="app"></main>

<button class="fab" id="fabBtn" style="display:none;" onclick="App.fabAction()">+</button>

<nav id="bottomnav">
  <button class="nav-btn" data-nav="dashboard" onclick="App.nav('dashboard')"><span class="ic">🏠</span>الرئيسية</button>
  <button class="nav-btn" data-nav="properties" onclick="App.nav('properties')"><span class="ic">🏢</span>العقارات</button>
  <button class="nav-btn" data-nav="tenants" onclick="App.nav('tenants')"><span class="ic">👤</span>المستأجرون</button>
  <button class="nav-btn" data-nav="contracts" onclick="App.nav('contracts')"><span class="ic">📄</span>العقود</button>
  <button class="nav-btn" data-nav="more" onclick="App.nav('more')"><span class="ic">⋯</span>المزيد</button>
</nav>

<div id="toast"></div>
<div id="modalRoot"></div>

<script>
/* =====================================================================
   عقاري PRO — تطبيق إدارة عقارات وإيجارات (من جهة العميل بالكامل)
   تخزين البيانات: localStorage فقط. لا يوجد خادم أو مزامنة حقيقية.
   ===================================================================== */

/* ---------------------- طبقة قاعدة البيانات المحلية ---------------------- */
const DB_KEY = 'aqari_pro_db_v1';

function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }

function seedDB(){
  return {
    settings:{ orgName:'مكتبي العقاري', theme:'dark', currentRole:'owner', currency:'SDG', ownerNationalId:'', ownerAddress:'', pin:'', usdRate:'' },
    properties:[], units:[], tenants:[], contracts:[], payments:[],
    maintenance:[], expenses:[], revenues:[], auditLog:[]
  };
}

let DB = loadDB();

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return seedDB();
    const parsed = JSON.parse(raw);
    // دمج آمن مع البنية الافتراضية لتفادي كسر التطبيق عند تحديثات مستقبلية
    return Object.assign(seedDB(), parsed);
  }catch(e){
    console.error('DB load failed, starting fresh', e);
    return seedDB();
  }
}

function saveDB(){
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}

function audit(action, entity, entityId, extra){
  DB.auditLog.unshift({ ts:new Date().toISOString(), action, entity, entityId, role:DB.settings.currentRole, extra:extra||null });
  if(DB.auditLog.length > 500) DB.auditLog.length = 500; // سقف تخزيني محلي فقط
}

/* ---------------------- ثوابت ونصوص ---------------------- */
const PROPERTY_TYPES = {apartment:'شقة', house:'منزل', building:'عمارة', shop:'محل', office:'مكتب', land:'أرض', warehouse:'مخزن'};
const UNIT_STATUS = {available:{l:'متاحة', c:'b-green', dot:'🟢'}, rented:{l:'مؤجرة', c:'b-red', dot:'🔴'}, reserved:{l:'محجوزة', c:'b-yellow', dot:'🟡'}, maintenance:{l:'صيانة', c:'b-gray', dot:'⚫'}};
const CONTRACT_STATUS = {draft:{l:'مسودة', c:'b-gray'}, active:{l:'ساري', c:'b-green'}, terminated:{l:'مفسوخ', c:'b-red'}, cancelled:{l:'ملغي', c:'b-gray'}};
const PAYMENT_STATUS = {paid:{l:'مدفوع', c:'b-green'}, partial:{l:'جزئي', c:'b-yellow'}, due:{l:'مستحق', c:'b-teal'}, late:{l:'متأخر', c:'b-red'}, cancelled:{l:'ملغي', c:'b-gray'}};
const PAYMENT_METHODS = {cash:'نقدي', bank_transfer:'تحويل بنكي', mobile_wallet:'محفظة إلكترونية', cheque:'شيك', other:'أخرى'};
const MAINT_PRIORITY = {low:{l:'منخفضة',c:'b-gray'}, medium:{l:'متوسطة',c:'b-teal'}, high:{l:'عالية',c:'b-yellow'}, urgent:{l:'عاجلة',c:'b-red'}};
const MAINT_STATUS = {open:{l:'مفتوح',c:'b-red'}, assigned:{l:'مسند',c:'b-yellow'}, in_progress:{l:'قيد التنفيذ',c:'b-teal'}, closed:{l:'مغلق',c:'b-green'}, cancelled:{l:'ملغي',c:'b-gray'}};
const EXPENSE_CATS = ['كهرباء','مياه','غاز','حراسة','نظافة','ضرائب','صيانة','رواتب','وقود','أخرى'];
const FURNITURE_CATALOG = {
  'غرفة النوم': ['سرير','مرتبة','دولاب ملابس','تسريحة (تواليت)','طاولة جانبية','خزانة أحذية'],
  'الصالة والمعيشة': ['أريكة (كنبة)','طاولة وسط','طاولة تلفزيون','كراسي صالة','رفوف/مكتبة','سجاد/موكيت','ستائر'],
  'غرفة الطعام': ['طاولة سفرة','كراسي سفرة','بوفيه / دولاب صحون'],
  'المطبخ': ['ثلاجة','غسالة ملابس','فرن غاز / موقد','ميكروويف','خزائن مطبخ','حوض مطبخ (سنك)','غلاية كهربائية'],
  'الأجهزة الكهربائية': ['مكيف هواء (تكييف)','تلفزيون','سخان مياه (جيزر)','مروحة','دفاية'],
  'الحمام': ['مرآة حمام','خزانة حمام'],
  'المكتب / أخرى': ['مكتب','كرسي مكتب','مصباح / إضاءة']
};
const REVENUE_CATS = ['إيجارات','رسوم','غرامات','خدمات'];
const ROLES = {owner:'المالك', admin:'مدير النظام', manager:'مدير', accountant:'محاسب', reception:'استقبال', maintenance:'صيانة', employee:'موظف', viewer:'مشاهدة فقط'};
const ROLE_ICONS = {owner:'👑', admin:'🛡️', manager:'📋', accountant:'💰', reception:'📞', maintenance:'🔧', employee:'🧑‍💼', viewer:'👁️'};

/* ---------------------- أدوات مساعدة عامة ---------------------- */
function fmtMoney(n){ n = Number(n||0); return n.toLocaleString('ar-SD',{maximumFractionDigits:0}) + ' ' + (DB.settings.currency||'SDG'); }
function fmtUSD(n){
  const rate = Number(DB.settings.usdRate||0);
  if(!rate) return '';
  const usd = Number(n||0)/rate;
  return '≈ $' + usd.toLocaleString('en-US',{maximumFractionDigits:0});
}
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'}); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>t.classList.remove('show'), 2200);
}
function genCode(len){ const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<len;i++) s+=chars[Math.floor(Math.random()*chars.length)]; return s; }

// يقرأ ملف صورة ويصغّره عبر Canvas قبل تحويله لـ Base64، لتقليل استهلاك مساحة localStorage المحدودة.
function readImageResized(file, maxDim){
  maxDim = maxDim || 480;
  return new Promise((resolve, reject)=>{
    if(!file){ resolve(''); return; }
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h){ if(w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
        else { if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
        const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = ()=>resolve('');
      img.src = e.target.result;
    };
    reader.onerror = ()=>resolve('');
    reader.readAsDataURL(file);
  });
}

/* ---------------------- محرك عام: كيانات، بحث، فرز ---------------------- */
function findById(arr, id){ return arr.find(x=>x.id===id); }
function propertyName(id){ const p=findById(DB.properties,id); return p ? p.name : '—'; }
function unitLabel(id){ const u=findById(DB.units,id); if(!u) return '—'; return propertyName(u.propertyId)+' — وحدة '+u.unitNumber; }
function tenantName(id){ const t=findById(DB.tenants,id); return t ? t.fullName : '—'; }
function contractLabel(id){ const c=findById(DB.contracts,id); if(!c) return '—'; return c.number+' ('+tenantName(c.tenantId)+')'; }

function unitsOfProperty(pid){ return DB.units.filter(u=>u.propertyId===pid); }

function computeContractStatus(c){
  if(c.status==='terminated' || c.status==='cancelled') return c.status;
  const today = todayISO();
  if(c.status==='draft') return 'draft';
  if(today > c.endDate) return 'expired';
  if(daysBetween(today, c.endDate) <= 30) return 'expiring_soon';
  return 'active';
}
const CONTRACT_STATUS_FULL = Object.assign({}, CONTRACT_STATUS, {
  expired:{l:'منتهي', c:'b-gray'}, expiring_soon:{l:'ينتهي قريباً', c:'b-yellow'}
});

function computePaymentStatus(p){
  if(p.status==='cancelled') return 'cancelled';
  if(p.amountPaid >= p.amountDue && p.amountDue>0) return 'paid';
  if(p.amountPaid > 0 && p.amountPaid < p.amountDue) return (todayISO() > p.dueDate ? 'late' : 'partial');
  return (todayISO() > p.dueDate ? 'late' : 'due');
}

const App = {
  route:'dashboard', params:{},

  init(){
    document.body.setAttribute('data-theme', DB.settings.theme||'dark');
    this.updateBrand();
    if(DB.settings.pin){ this.showLock(); } else { this.nav('dashboard'); }
  },

  showLock(){
    const overlay = el(`
      <div id="lockOverlay" style="position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;">
        <div class="brand-mark" style="width:56px;height:56px;font-size:26px;">ع</div>
        <div style="font-family:var(--serif);font-size:19px;font-weight:700;">عقاري PRO مقفل</div>
        <input id="lockInput" type="password" inputmode="numeric" placeholder="أدخل رمز القفل" style="width:220px;text-align:center;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:13px;font-size:16px;letter-spacing:.2em;">
        <button class="btn" id="lockBtn" style="width:220px;">دخول</button>
        <div style="font-size:11px;color:var(--muted);text-align:center;max-width:260px;">⚠ هذا القفل حماية محلية بسيطة على هذا الجهاز فقط، وليس تشفيراً حقيقياً — أي شخص يصل لملفات الجهاز مباشرة قد يتجاوزه.</div>
      </div>`);
    document.body.appendChild(overlay);
    const tryUnlock = ()=>{
      const val = document.getElementById('lockInput').value;
      if(val === DB.settings.pin){ overlay.remove(); App.nav('dashboard'); }
      else { toast('رمز غير صحيح'); document.getElementById('lockInput').value=''; }
    };
    overlay.querySelector('#lockBtn').onclick = tryUnlock;
    overlay.querySelector('#lockInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  },

  updateBrand(){
    document.getElementById('orgNameLabel').textContent = DB.settings.orgName || 'مكتبي العقاري';
    const chip = document.getElementById('roleChip');
    chip.textContent = ROLE_ICONS[DB.settings.currentRole] || '👤';
    chip.title = 'الدور الحالي: ' + (ROLES[DB.settings.currentRole] || '—');
  },

  nav(route, params){
    this.route = route; this.params = params||{};
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.nav===route || (route==='more' && b.dataset.nav==='more')));
    const fab = document.getElementById('fabBtn');
    fab.style.display = ['properties','tenants','contracts','payments','maintenance','finance'].includes(route) ? 'flex':'none';
    this.render();
    window.scrollTo(0,0);
  },

  setTitle(t, sub){
    document.getElementById('screenLabel').textContent = t;
    document.getElementById('screenSub').textContent = sub||'';
  },

  fabAction(){
    const map = {properties:'property', tenants:'tenant', contracts:'contract', payments:'payment', maintenance:'maintenance', finance:'expense'};
    const key = map[this.route];
    if(key) Forms.open(key, null);
  },

  openSearch(){ Screens.searchModal(); },

  render(){
    const app = document.getElementById('app');
    app.innerHTML = '';
    const map = {
      dashboard: Screens.dashboard, properties: Screens.properties, propertyDetail: Screens.propertyDetail,
      tenants: Screens.tenants, tenantDetail: Screens.tenantDetail,
      contracts: Screens.contracts, contractDetail: Screens.contractDetail,
      payments: Screens.payments, maintenance: Screens.maintenance,
      finance: Screens.finance, reports: Screens.reports, settings: Screens.settings, more: Screens.more
    };
    const fn = map[this.route] || Screens.dashboard;
    app.appendChild(fn(this.params));
  }
};

/* ============================= النوافذ المنبثقة (Modal) ============================= */
const Modal = {
  open(title, bodyEl, opts){
    opts = opts||{};
    const root = document.getElementById('modalRoot');
    root.innerHTML = '';
    const backdrop = el(`<div class="modal-backdrop ${opts.center?'center':''}"></div>`);
    const modal = el(`<div class="modal"><div class="modal-head"><h3></h3><button class="icon-btn">✕</button></div><div class="modal-body"></div></div>`);
    modal.querySelector('h3').textContent = title;
    modal.querySelector('.modal-body').appendChild(bodyEl);
    modal.querySelector('.icon-btn').onclick = Modal.close;
    backdrop.appendChild(modal);
    backdrop.addEventListener('click', e=>{ if(e.target===backdrop) Modal.close(); });
    root.appendChild(backdrop);
  },
  close(){ document.getElementById('modalRoot').innerHTML=''; }
};

/* ============================= النماذج (Forms) ============================= */
const Forms = {
  open(type, id, defaults){
    const map = {
      property: Forms.property, unit: Forms.unit, tenant: Forms.tenant, contract: Forms.contract,
      payment: Forms.payment, maintenance: Forms.maintenance, expense: ()=>Forms.finance('expenses'),
      revenue: ()=>Forms.finance('revenues')
    };
    const fn = map[type];
    if(fn) fn(id, defaults);

    return `<div class="field"><label>${esc(label)}${required?' <span class="req">*</span>':''}</label>${inputHtml}</div>`;
  },
  _select(id, options, selected, placeholder){
    let html = `<select id="${id}">`;
    if(placeholder) html += `<option value="">${esc(placeholder)}</option>`;
    options.forEach(([v,l])=> html += `<option value="${v}" ${selected===v?'selected':''}>${esc(l)}</option>`);
    html += `</select>`;
    return html;
  },

    const p = id ? findById(DB.properties,id) : {code:'PR-'+genCode(4), name:'', type:'apartment', city:'', district:'', address:'', plotNumber:'', area:'', floors:'', parking:'', notes:'', coverImage:''};

      else { DB.properties.push(obj); audit('create','property',obj.id); }

Forms.open = (function(orig){
  return function(type, id, defaults){
    if(type==='expense') return Forms.finance('expenses', id, defaults);
    if(type==='revenue') return Forms.finance('revenues', id, defaults);
    return orig(type, id, defaults);
  };
})(Forms.open);

/* ============================= قائمة المنقولات (Inventory) ============================= */
const Inventory = {
  open(contractId){
    const c = findById(DB.contracts, contractId);
    if(!c.inventory) c.inventory = [];
    const optionsHtml = Object.entries(FURNITURE_CATALOG).map(([group, items])=>
      `<optgroup label="${esc(group)}">${items.map(it=>`<option value="${esc(it)}">${esc(it)}</option>`).join('')}</optgroup>`
    ).join('') + `<optgroup label="أخرى"><option value="__custom__">✏️ قطعة أخرى (اكتبها يدوياً)</option></optgroup>`;
    const body = el(`<div>
      <div id="invListHolder"></div>
      <div class="section-title" style="margin-top:18px;">إضافة قطعة جديدة</div>
      <div class="field"><label>اختر القطعة من القائمة</label>
        <select id="inv_select"><option value="">— اختر —</option>${optionsHtml}</select>
      </div>
      <div class="field" id="inv_custom_wrap" style="display:none;"><label>اسم القطعة (مخصص)</label><input id="inv_custom" placeholder="اكتب اسم القطعة..."></div>
      <div class="field-row">
        <div class="field"><label>الكمية</label><input id="inv_qty" type="number" value="1" min="1"></div>
        <div class="field"><label>الحالة</label>
          <select id="inv_cond">
            <option value="جديد">جديد</option>
            <option value="جيد" selected>جيد</option>
            <option value="متوسط">متوسط</option>
            <option value="يحتاج صيانة">يحتاج صيانة</option>
          </select>
        </div>
      </div>
      <div class="field"><label>ملاحظات (اختياري)</label><input id="inv_notes" placeholder="مثال: خدش بسيط في الجانب"></div>
      <button class="btn secondary" id="addInvBtn">+ إضافة للقائمة</button>
      <div class="btn-row">
        <button class="btn" id="printInvBtn">🖨️ طباعة قائمة المنقولات</button>
      </div>
    </div>`);
    Modal.open('قائمة المنقولات — '+c.number, body);
    Inventory._renderList(c, body);
    body.querySelector('#inv_select').addEventListener('change', e=>{
      body.querySelector('#inv_custom_wrap').style.display = e.target.value==='__custom__' ? 'block' : 'none';
    });
    body.querySelector('#addInvBtn').onclick = ()=>{
      const sel = body.querySelector('#inv_select').value;
      const name = sel==='__custom__' ? body.querySelector('#inv_custom').value.trim() : sel;
      if(!name){ toast('اختر قطعة من القائمة أو اكتب اسمها'); return; }
      c.inventory.push({
        id:uid(), name, qty:body.querySelector('#inv_qty').value||1,
        condition:body.querySelector('#inv_cond').value, notes:body.querySelector('#inv_notes').value.trim()
      });
      audit('update','contract_inventory', c.id);
      saveDB();
      body.querySelector('#inv_select').value = '';
      body.querySelector('#inv_custom').value = '';
      body.querySelector('#inv_custom_wrap').style.display = 'none';
      body.querySelector('#inv_notes').value = '';
      body.querySelector('#inv_qty').value = 1;
      Inventory._renderList(c, body);
      toast('تمت إضافة القطعة');
    };
    body.querySelector('#printInvBtn').onclick = ()=>Documents.printInventory(c.id);
  },

  _renderList(c, body){
    const holder = body.querySelector('#invListHolder'); holder.innerHTML='';
    if(!c.inventory.length){ holder.appendChild(el('<div class="empty">لا توجد قطع مسجّلة بعد. أضف أول قطعة من الأسفل.</div>')); return; }
    const card = el('<div class="card"></div>');
    c.inventory.forEach(item=>{
      const row = el(`
        <div class="list-row">
          <div class="main"><div class="t">${esc(item.name)} × ${esc(item.qty)}</div><div class="s">${esc(item.condition)}${item.notes?(' · '+esc(item.notes)):''}</div></div>
          <button class="icon-btn" style="width:32px;height:32px;font-size:13px;">🗑️</button>
        </div>`);
      row.querySelector('button').onclick = (e)=>{
        e.stopPropagation();
        c.inventory = c.inventory.filter(x=>x.id!==item.id);
        audit('delete','contract_inventory_item', item.id);
        saveDB(); Inventory._renderList(c, body); toast('تم حذف القطعة');
      };
      card.appendChild(row);
    });
    holder.appendChild(card);
  }

/* ============================= التوقيع الإلكتروني (Signature) ============================= */
const Signature = {
  open(contractId, who){
    const c = findById(DB.contracts, contractId);
    const key = who==='landlord' ? 'landlordSignature' : 'tenantSignature';
    const title = who==='landlord' ? 'توقيع المؤجر' : 'توقيع المستأجر';
    const body = el(`<div>
      <div style="background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--line);">
        <canvas id="sigCanvas" style="width:100%;height:180px;display:block;touch-action:none;"></canvas>
      </div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:8px;">وقّع بإصبعك أو الفأرة داخل المربع أعلاه.</div>
      <div class="btn-row">
        <button class="btn secondary small" id="sigClear">مسح</button>
        <button class="btn small" id="sigSave">حفظ التوقيع</button>
      </div>
    </div>`);
    Modal.open(title, body, {center:true});

    const canvas = body.querySelector('#sigCanvas');
    const ctx = canvas.getContext('2d');
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2.4; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#111';

    let drawing = false, last = null;
    const getPos = (e)=>{
      const r = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - r.left, y: t.clientY - r.top };
    };
    const start = (e)=>{ drawing = true; last = getPos(e); e.preventDefault(); };
    const move = (e)=>{
      if(!drawing) return;
      const p = getPos(e);
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      last = p; e.preventDefault();
    };
    const end = ()=>{ drawing = false; };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end);

    body.querySelector('#sigClear').onclick = ()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); };
    body.querySelector('#sigSave').onclick = ()=>{
      c[key] = canvas.toDataURL('image/png');
      audit('update','contract_signature_'+who, c.id);
      saveDB(); toast('تم حفظ التوقيع'); Modal.close(); App.nav('contractDetail',{id:c.id});
    };
  }
};

/* ============================= الرسم البياني للتقارير (Reports) ============================= */
const Reports = {
  drawChart(canvas){
    if(!canvas || !canvas.getContext) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);

    const months = [];
    const now = new Date();
    for(let i=5;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      months.push({ key: d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'), label: d.toLocaleDateString('ar-EG',{month:'short'}) });
    }
    const revByMonth = {}, expByMonth = {};
    months.forEach(m=>{ revByMonth[m.key]=0; expByMonth[m.key]=0; });
    DB.revenues.forEach(r=>{ const k=(r.date||'').slice(0,7); if(k in revByMonth) revByMonth[k]+=Number(r.amount||0); });
    DB.payments.forEach(p=>{ if(Number(p.amountPaid)>0){ const k=(p.paidDate||p.dueDate||'').slice(0,7); if(k in revByMonth) revByMonth[k]+=Number(p.amountPaid||0); } });
    DB.expenses.forEach(e=>{ const k=(e.date||'').slice(0,7); if(k in expByMonth) expByMonth[k]+=Number(e.amount||0); });

    const maxVal = Math.max(1, ...months.map(m=>Math.max(revByMonth[m.key], expByMonth[m.key])));
    const padding = {top:14, bottom:26, left:8, right:8};
    const chartH = H - padding.top - padding.bottom;
    const groupW = (W - padding.left - padding.right) / months.length;
    const barW = Math.max(6, groupW*0.26);

    ctx.strokeStyle = 'rgba(125,138,168,.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padding.left, H-padding.bottom); ctx.lineTo(W-padding.right, H-padding.bottom); ctx.stroke();

    ctx.font = '11px IBM Plex Sans Arabic, sans-serif';
    ctx.textAlign = 'center';

    months.forEach((m,i)=>{
      const cx = padding.left + groupW*i + groupW/2;
      const rH = (revByMonth[m.key]/maxVal) * chartH;
      const eH = (expByMonth[m.key]/maxVal) * chartH;
      ctx.fillStyle = '#6d5ef0';
      ctx.fillRect(cx - barW - 3, H-padding.bottom-rH, barW, rH);
      ctx.fillStyle = '#ff6b6b';
      ctx.fillRect(cx + 3, H-padding.bottom-eH, barW, eH);
      ctx.fillStyle = '#7d8aa8';
      ctx.fillText(m.label, cx, H-padding.bottom+17);
    });
  }
};

      const tmp = document.createElement('div');

      document.body.appendChild(tmp);
      try{ new QRCode(tmp, {text, width:size, height:size}); }catch(e){ document.body.removeChild(tmp); resolve(''); return; }
      setTimeout(()=>{
        let dataUrl = '';
        const img = tmp.querySelector('img');
        const canvas = tmp.querySelector('canvas');
        if(img && img.src) dataUrl = img.src;

      <div class="pclause">1. <b>مدة الإيجار:</b> مدة هذا العقد تبدأ من ${fmtDate(c.startDate)} وتنتهي في ${fmtDate(c.endDate)}. ولا يتجدد العقد إلا باتفاق خطي جديد بين الطرفين.</div>
      <div class="pclause">2. <b>قيمة الإيجار:</b> اتفق الطرفان على أن تكون أجرة الوحدة مبلغ ${fmtMoney(c.rent)}، تُدفع (${esc(PAYMENT_METHODS[c.paymentMethod]||'—')}) على ${esc(c.installments||1)} دفعة/دفعات، في موعد أقصاه اليوم ${esc(dueDay)} من كل شهر/فترة.</div>
      <div class="pclause">3. <b>التأمين (الضمان):</b> دفع المستأجر مبلغ ${fmtMoney(c.deposit)} كتأمين مسترد. لا يحق للمستأجر خصم هذا المبلغ من الإيجار، ويُرد له بعد إخلاء الوحدة وتسليمها بحالتها الأصلية وبعد التأكد من سداد كافة الفواتير.</div>
      <div class="pclause">4. <b>حالة الوحدة والأثاث:</b> يقر المستأجر بأنه عاين الوحدة (والأثاث إن وُجد، حسب قائمة المنقولات المرفقة) ووجدها بحالة جيدة، ويلتزم بالحفاظ عليها. يتحمل المستأجر تكلفة إصلاح أي تلف يطرأ نتيجة سوء الاستخدام.</div>
      <div class="pclause">5. <b>الالتزامات المالية:</b> يلتزم المستأجر بسداد فواتير (الكهرباء، المياه، رسوم النفايات) بانتظام، ويُعتبر عدم السداد إخلالاً ببنود العقد.</div>
      <div class="pclause">6. <b>حظر التأجير من الباطن:</b> يُمنع منعاً باتاً على المستأجر تأجير الوحدة من الباطن، أو التنازل عن العقد للغير، أو إجراء أي تعديلات أو ثقوب في الجدران دون موافقة المؤجر الخطية.</div>
      <div class="pclause">7. <b>الاستخدام:</b> الوحدة مخصصة للسكن الخاص فقط، ويُمنع استخدامها لأي أغراض أخرى.</div>
      <div class="pclause">8. <b>الإخلاء:</b> عند انتهاء العقد، يلتزم المستأجر بالإخلاء وتسليم المفاتيح في الموعد المحدد. في حال التأخر عن الإخلاء، يلتزم المستأجر بدفع ${esc(lateFeeText)}.</div>
      <div class="pclause">9. <b>إنهاء العقد:</b> في حال تأخر المستأجر عن سداد الإيجار لمدة ${esc(graceDays)} يوماً، أو مخالفة أي بند من بنود العقد، يحق للمؤجر اتخاذ إجراءات إنهاء العقد وفق الأحكام القانونية المعمول بها.</div>

      <p style="margin-top:14px;"><b>ملحق قائمة المنقولات:</b><br>
      (يُرفق بهذا العقد ورقة منفصلة تحتوي على جرد كامل للأثاث والأجهزة الكهربائية إن وُجدت، مع توقيع الطرفين على كل صفحة من الملحق).</p>

      <div class="warnbox">⚠ تنبيه: هذا العقد نموذج مساعد ولا يُغني عن المراجعة القانونية المحلية أو التوثيق الرسمي إذا اشترطه القانون السوداني قبل الاعتماد النهائي.</div>

      <div class="sigrow" style="margin-top:26px;">
        <div class="psig">${landlordSigHtml}توقيع المؤجر</div>
        <div class="psig">${tenantSigHtml}توقيع المستأجر</div>
      </div>
      <p style="margin-top:26px; font-weight:700;">الشهود:</p>
      <p>1. الاسم: ........................... التوقيع: ...........................</p>
      <p>2. الاسم: ........................... التوقيع: ...........................</p>

      ${qr?('<div class="qr-box"><img src="'+qr+'" width="100" height="100"></div><div style="text-align:center;font-family:monospace;font-size:10.5px;">رمز تحقق داخلي (اختياري): '+esc(c.verificationCode)+'</div>'):''}
    `;
    Documents._openPrintWindow('عقد '+c.number, html);
  },

  printInventory(id){
    const c = findById(DB.contracts, id);
    const items = c.inventory || [];
    const rows = items.map((it,i)=>`<tr><td>${i+1}</td><td>${esc(it.name)}</td><td>${esc(it.qty)}</td><td>${esc(it.condition)}</td><td>${esc(it.notes||'')}</td></tr>`).join('');
    const html = `
      <div class="hdr">
        <div class="h1">ملحق قائمة المنقولات</div>
        <div class="h2">مرفق بعقد إيجار رقم ${esc(c.number)} — ${esc(tenantName(c.tenantId))}</div>
      </div>
      <table>
        <thead><tr><th>#</th><th>القطعة</th><th>الكمية</th><th>الحالة</th><th>ملاحظات</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" style="text-align:center;padding:16px;">لا توجد قطع مسجّلة بعد</td></tr>'}</tbody>
      </table>
      <p style="margin-top:14px; font-size:12px;">يقر الطرفان بمطابقة هذه القائمة لحالة الأثاث والأجهزة المسلَّمة مع الوحدة بتاريخ بدء العقد.</p>
      <div class="sigrow" style="margin-top:40px;">
        <div class="psig">توقيع المؤجر</div>
        <div class="psig">توقيع المستأجر</div>
      </div>`;
    Documents._openPrintWindow('ملحق المنقولات - '+c.number, html);
  },

  printHandover(id, type){
    const c = findById(DB.contracts, id);
    const key = type==='out' ? 'handoverOut' : 'handoverIn';
    const data = c[key] || {};
    const title = type==='out' ? 'محضر تسليم الوحدة' : 'محضر استلام الوحدة';
    const html = `
      <div class="hdr">
        <div class="h1">${esc(title)}</div>
        <div class="h2">مرفق بعقد إيجار رقم ${esc(c.number)} — ${esc(tenantName(c.tenantId))}</div>
      </div>
      <div class="kv2">
        <p><b>التاريخ:</b> ${fmtDate(data.date||todayISO())}</p>
        <p><b>حالة الحوائط والدهانات:</b> ${esc(data.walls||'—')}</p>
        <p><b>حالة السباكة:</b> ${esc(data.plumbing||'—')}</p>
        <p><b>حالة الكهرباء والتوصيلات:</b> ${esc(data.electricity||'—')}</p>
        <p><b>ملاحظات إضافية:</b> ${esc(data.notes||'—')}</p>
      </div>
      <div class="sigrow" style="margin-top:40px;">
        <div class="psig">توقيع المؤجر</div>
        <div class="psig">توقيع المستأجر</div>
      </div>`;
    Documents._openPrintWindow(title+' - '+c.number, html);
  },

  printReceipt(id){
    const p = findById(DB.payments, id);
    const c = findById(DB.contracts, p.contractId);
    const t = findById(DB.tenants, c.tenantId);
    const html = `
      <div class="hdr">
        <div class="h1">إيصال دفع</div>
        <div class="h2">${esc(DB.settings.orgName)}</div>
        <div class="h3">${esc(p.receiptNumber)}</div>
      </div>
      <div class="kv2">
        <p><b>المستأجر:</b> ${esc(t.fullName)}</p>
        <p><b>العقد:</b> ${esc(c.number)} — <b>الوحدة:</b> ${esc(unitLabel(c.unitId))}</p>
        <p><b>المبلغ المستحق:</b> ${fmtMoney(p.amountDue)}</p>
        <p><b>المبلغ المدفوع:</b> ${fmtMoney(p.amountPaid)}</p>
        <p><b>تاريخ الاستحقاق:</b> ${fmtDate(p.dueDate)} — <b>تاريخ الدفع:</b> ${fmtDate(p.paidDate)}</p>
        <p><b>طريقة الدفع:</b> ${esc(PAYMENT_METHODS[p.method]||'—')}</p>
      </div>
      <div class="psig" style="margin-top:70px;">توقيع المستلم</div>`;
    Documents._openPrintWindow('إيصال '+p.receiptNumber, html);
  },

  printReport(){
    const revenue = DB.revenues.reduce((s,r)=>s+Number(r.amount||0),0) + DB.payments.reduce((s,p)=>s+Number(p.amountPaid||0),0);
    const expense = DB.expenses.reduce((s,r)=>s+Number(r.amount||0),0);
    const html = `
      <div class="hdr">
        <div class="h1">تقرير مالي وتشغيلي</div>
        <div class="h2">${esc(DB.settings.orgName)} — ${fmtDate(todayISO())}</div>
      </div>
      <div class="kv2">
        <p>إجمالي الإيرادات: ${fmtMoney(revenue)}</p>
        <p>إجمالي المصروفات: ${fmtMoney(expense)}</p>
        <p>صافي الربح: ${fmtMoney(revenue-expense)}</p>
        <p>عدد العقارات: ${DB.properties.length} — عدد الوحدات: ${DB.units.length}</p>
        <p>عدد العقود السارية: ${DB.contracts.filter(c=>['active','expiring_soon'].includes(computeContractStatus(c))).length}</p>
        <p>دفعات متأخرة: ${DB.payments.filter(p=>computePaymentStatus(p)==='late').length}</p>
      </div>`;
    Documents._openPrintWindow('تقرير مالي', html);
  },

  exportCSV(){
    let rows = [['النوع','الفئة','المبلغ','التاريخ','العقار']];
    DB.expenses.forEach(e=>rows.push(['مصروف', e.category, e.amount, e.date, propertyName(e.propertyId)]));
    DB.revenues.forEach(r=>rows.push(['إيراد', r.category, r.amount, r.date, propertyName(r.propertyId)]));
    const csv = rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='taqrir-mali-'+todayISO()+'.csv';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }
};

/* ============================= بدء التشغيل ============================= */
App.init();
</script>
</body>
</html>
