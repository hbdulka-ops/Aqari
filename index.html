<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عقاري">
<meta name="theme-color" content="#070a12">
<title>عقاري — إدارة عقارات وإيجارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="icon" id="app-favicon" href="">
<link rel="apple-touch-icon" id="app-touch-icon" href="">
<link rel="manifest" id="app-manifest" href="">
<style>
:root{
  --purple:#6d5ef0;
  --purple-dim:#584adf;
  --purple-glow:rgba(109,94,240,.35);
  --gold:#d4af6a;
  --gold-dim:#b8945a;
  --bg:#070a12;
  --bg-1:#0c1020;
  --surface:#11162a;
  --surface-2:#161c35;
  --surface-3:#1c2340;
  --border:#262e4d;
  --border-soft:#1b2140;
  --text:#eef0fb;
  --text-dim:#a8adc9;
  --text-mute:#6c7295;
  --green:#4ade80;
  --red:#f87171;
  --yellow:#facc15;
  --gray:#5b6082;
  --radius:16px;
  --radius-sm:10px;
  --radius-lg:24px;
  --font-body:'IBM Plex Sans Arabic',sans-serif;
  --font-display:'Cormorant Garamond',serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow-lg:0 20px 60px -20px rgba(0,0,0,.6);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(109,94,240,.18), transparent 60%),
    radial-gradient(900px 500px at 110% 10%, rgba(212,175,106,.10), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--purple-glow);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;}

.hidden{display:none !important;}

/* ---------- App shell ---------- */
#app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:96px;}

/* Header */
.app-header{
  position:sticky; top:0; z-index:40;
  padding:14px 16px 12px;
  background:linear-gradient(180deg, rgba(7,10,18,.96), rgba(7,10,18,.85) 70%, transparent);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #8a7bff, var(--purple) 55%, #3f36a8 100%);
  border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:19px; color:#fff;
  box-shadow:0 0 0 3px rgba(212,175,106,.12), 0 6px 18px -4px var(--purple-glow);
  flex-shrink:0;
}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-title{font-family:var(--font-display); font-size:21px; font-weight:700; letter-spacing:.3px;
  background:linear-gradient(90deg,#fff,var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.brand-org{font-size:11px; color:var(--text-mute); margin-top:1px;}
.header-actions{display:flex; align-items:center; gap:8px;}
.role-badge{
  font-size:11px; padding:5px 10px; border-radius:100px; border:1px solid var(--border);
  background:var(--surface); color:var(--text-dim); display:flex; align-items:center; gap:5px;
}
.icon-btn{
  width:36px;height:36px;border-radius:12px; border:1px solid var(--border); background:var(--surface);
  display:flex;align-items:center;justify-content:center; color:var(--text-dim); font-size:16px; cursor:pointer;
}
.icon-btn:active{transform:scale(.94);}

/* Bottom nav */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; justify-content:center;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  pointer-events:none;
}
.bottom-nav-inner{
  pointer-events:auto;
  max-width:520px; width:100%;
  display:flex; justify-content:space-between; gap:2px;
  background:rgba(17,22,42,.85); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--border); border-radius:22px;
  padding:6px; box-shadow:var(--shadow-lg);
}
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 2px; border-radius:16px; color:var(--text-mute); font-size:10px; cursor:pointer;
  transition:.15s;
}
.nav-item .ic{font-size:18px;}
.nav-item.active{color:var(--gold); background:rgba(212,175,106,.09);}

/* Content */
#app-content{padding:6px 16px 24px;}

.section-title{
  font-family:var(--font-display); font-size:22px; font-weight:700; margin:18px 2px 12px;
  display:flex; align-items:center; justify-content:space-between;
}
.section-title small{font-family:var(--font-body); font-size:11px; color:var(--text-mute); font-weight:400;}

.card{
  background:linear-gradient(180deg, var(--surface), var(--surface) 100%);
  border:1px solid var(--border-soft); border-radius:var(--radius);
  padding:14px; margin-bottom:10px;
  position:relative; overflow:hidden;
}
.card:active{border-color:var(--border);}
.card-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}

.stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px;}
.stat-card{
  background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius);
  padding:14px; position:relative; overflow:hidden;
}
.stat-card::after{content:'';position:absolute; inset:0; background:linear-gradient(135deg, var(--purple-glow), transparent 60%); opacity:.5;}
.stat-num{font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--text); position:relative;}
.stat-label{font-size:11.5px; color:var(--text-dim); margin-top:3px; position:relative;}
.stat-card.gold .stat-num{color:var(--gold);}
.stat-card.green .stat-num{color:var(--green);}
.stat-card.red .stat-num{color:var(--red);}

.chip{
  display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:4px 9px; border-radius:100px;
  border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); white-space:nowrap;
}
.chip.dot::before{content:''; width:6px;height:6px;border-radius:50%; background:currentColor;}
.chip.st-available{color:var(--green); border-color:rgba(74,222,128,.3); background:rgba(74,222,128,.08);}
.chip.st-rented{color:var(--red); border-color:rgba(248,113,113,.3); background:rgba(248,113,113,.08);}
.chip.st-reserved{color:var(--yellow); border-color:rgba(250,204,21,.3); background:rgba(250,204,21,.08);}
.chip.st-maintenance{color:var(--text-mute); border-color:var(--border); background:var(--surface-3);}
.chip.st-paid{color:var(--green); border-color:rgba(74,222,128,.3); background:rgba(74,222,128,.08);}
.chip.st-partial{color:var(--yellow); border-color:rgba(250,204,21,.3); background:rgba(250,204,21,.08);}
.chip.st-due{color:var(--text-dim);}
.chip.st-late{color:var(--red); border-color:rgba(248,113,113,.3); background:rgba(248,113,113,.08);}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:12px 16px; border-radius:13px; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); font-size:14px; font-weight:500; cursor:pointer; width:100%;
}
.btn:active{transform:scale(.98);}
.btn.primary{background:linear-gradient(135deg, var(--purple), var(--purple-dim)); border-color:var(--purple); color:#fff; box-shadow:0 8px 20px -8px var(--purple-glow);}
.btn.gold{background:linear-gradient(135deg, var(--gold), var(--gold-dim)); border-color:var(--gold); color:#1a1206; font-weight:600;}
.btn.ghost{background:transparent;}
.btn.danger{background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.3); color:var(--red);}
.btn.sm{padding:8px 12px; font-size:12.5px; width:auto;}
.btn-row{display:flex; gap:8px;}
.fab{
  position:fixed; bottom:96px; left:18px; z-index:45;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),#4b3fc9); border:1px solid var(--gold);
  color:#fff; font-size:24px; display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 30px -8px var(--purple-glow); cursor:pointer;
}

.empty-state{text-align:center; padding:40px 16px; color:var(--text-mute);}
.empty-state .ic{font-size:38px; margin-bottom:10px; opacity:.7;}
.empty-state .t{color:var(--text-dim); font-size:14px; margin-bottom:14px;}

.list-item{
  display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid var(--border-soft);
  cursor:pointer;
}
.list-item:last-child{border-bottom:none;}
.list-avatar{
  width:42px;height:42px;border-radius:12px; background:var(--surface-3); display:flex;align-items:center;justify-content:center;
  font-size:18px; flex-shrink:0; overflow:hidden; border:1px solid var(--border-soft);
}
.list-avatar img{width:100%;height:100%;object-fit:cover;}
.list-body{flex:1; min-width:0;}
.list-title{font-size:14.5px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.list-sub{font-size:12px; color:var(--text-mute); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.list-end{text-align:left; flex-shrink:0;}
.list-amount{font-family:var(--font-mono); font-size:13.5px; color:var(--text);}

.field{margin-bottom:12px;}
.field label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%; padding:11px 12px; border-radius:11px; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); font-size:14px;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--purple); outline-offset:0; border-color:var(--purple);}
.field textarea{min-height:70px; resize:vertical;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.field small.hint{display:block; margin-top:5px; font-size:11px; color:var(--text-mute);}
.checkbox-row{display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--text-dim);}

.tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:8px 14px; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim);
  font-size:12.5px; white-space:nowrap; cursor:pointer; flex-shrink:0;
}
.tab.active{background:var(--purple); border-color:var(--purple); color:#fff;}

/* Modal */
.modal-overlay{
  position:fixed; inset:0; z-index:100; background:rgba(4,5,12,.72); backdrop-filter:blur(4px);
  display:flex; align-items:flex-end; justify-content:center;
}
.modal-overlay.center{align-items:center; padding:20px;}
.modal-sheet{
  width:100%; max-width:560px; max-height:92vh; overflow-y:auto;
  background:var(--bg-1); border:1px solid var(--border); border-top-left-radius:24px; border-top-right-radius:24px;
  padding:18px 18px calc(24px + env(safe-area-inset-bottom));
  animation:sheetUp .22s ease-out;
}
.modal-overlay.center .modal-sheet{border-radius:20px;}
@keyframes sheetUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-handle{width:38px;height:4px;background:var(--border); border-radius:10px; margin:0 auto 14px;}
.modal-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
.modal-title{font-family:var(--font-display); font-size:20px; font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:10px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); display:flex;align-items:center;justify-content:center; cursor:pointer;}

/* toast */
#toast-wrap{position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center; width:100%; max-width:520px; padding:0 16px; pointer-events:none;}
.toast{background:var(--surface-3); border:1px solid var(--border); color:var(--text); padding:11px 16px; border-radius:12px; font-size:13px; box-shadow:var(--shadow-lg); animation:toastIn .2s ease-out;}
.toast.success{border-color:rgba(74,222,128,.4); color:var(--green);}
.toast.error{border-color:rgba(248,113,113,.4); color:var(--red);}
@keyframes toastIn{from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);}}

/* Welcome */
.welcome-screen{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px;}
.welcome-logo{
  width:96px;height:96px;border-radius:28px;
  background:radial-gradient(circle at 30% 25%, #9384ff, var(--purple) 55%, #352c92 100%);
  border:2px solid var(--gold); display:flex;align-items:center;justify-content:center; margin-bottom:22px;
  box-shadow:0 0 0 8px rgba(212,175,106,.07), 0 20px 50px -12px var(--purple-glow);
  font-family:var(--font-display); font-size:44px; font-weight:700; color:#fff;
}
.welcome-title{font-family:var(--font-display); font-size:34px; font-weight:700; background:linear-gradient(90deg,#fff,var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:8px;}
.welcome-sub{color:var(--text-dim); font-size:14px; max-width:320px; line-height:1.8; margin-bottom:34px;}

/* PIN */
.pin-screen{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;}
.pin-dots{display:flex; gap:14px; margin:26px 0;}
.pin-dot{width:14px;height:14px;border-radius:50%; border:1.5px solid var(--gold); background:transparent;}
.pin-dot.filled{background:var(--gold);}
.pin-pad{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:260px;}
.pin-key{
  width:74px;height:74px;border-radius:50%; background:var(--surface-2); border:1px solid var(--border);
  color:var(--text); font-size:22px; display:flex;align-items:center;justify-content:center; cursor:pointer;
}
.pin-key:active{background:var(--surface-3);}

/* signature pad */
.sig-pad-wrap{background:#fff; border-radius:14px; overflow:hidden; border:1px solid var(--border);}
.sig-pad-wrap canvas{display:block; width:100%; touch-action:none;}

/* Loader */
.loader{width:26px;height:26px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* misc */
.divider{height:1px; background:var(--border-soft); margin:14px 0;}
.muted{color:var(--text-mute);}
.text-center{text-align:center;}
.mt-0{margin-top:0;}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.badge-count{background:var(--red); color:#fff; font-size:10px; min-width:16px; height:16px; border-radius:10px; display:flex;align-items:center;justify-content:center; padding:0 4px;}
.progress-track{height:6px; background:var(--surface-3); border-radius:10px; overflow:hidden; margin-top:8px;}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--purple),var(--gold)); border-radius:10px;}

@media print{ body *{visibility:hidden;} }
</style>
</head>
<body>

<div id="app">
  <!-- Welcome / Lock / Main are toggled from JS -->
  <div id="welcome-root"></div>
  <div id="lock-root"></div>

  <div id="main-root" class="hidden">
    <header class="app-header">
      <div class="brand">
        <div class="icon-btn hidden" id="back-btn" title="رجوع" style="margin-left:2px;">←</div>
        <div class="brand-mark">ع</div>
        <div class="brand-text">
          <div class="brand-title">عقاري</div>
          <div class="brand-org" id="org-name-label">مبنى غير مسمى</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="role-badge" id="role-badge">👑 مالك</div>
        <div class="icon-btn" id="lock-now-btn" title="قفل">🔒</div>
      </div>
    </header>

    <main id="app-content"></main>

    <div class="fab hidden" id="fab-add">+</div>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
    </nav>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-wrap"></div>

<script>
/* =========================================================
   عقاري — Aqari Pro
   ملف واحد كامل: DB (localStorage) + شاشات + نماذج + طباعة
========================================================= */

/* ---------------- Utils ---------------- */
const U = {
  uid(prefix){ return (prefix?prefix+'_':'') + Date.now().toString(36) + Math.random().toString(36).slice(2,8); },
  today(){ return new Date().toISOString().slice(0,10); },
  now(){ return new Date().toISOString(); },
  fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); if(isNaN(d)) return iso;
    return d.toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'}); },
  daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); },
  durationText(start,end){
    const days = U.daysBetween(start,end);
    if(days<=0) return '—';
    const months = Math.round(days/30.4);
    if(months>=1){
      if(months===12) return 'سنة واحدة';
      if(months%12===0) return (months/12)+' سنوات';
      return months + (months===1?' شهر':' أشهر');
    }
    return days + ' يوماً';
  },
  esc(s){ if(s===undefined||s===null) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
  money(n, currencyOverride){
    n = Number(n)||0;
    const cur = currencyOverride || (DB.settings.currency?.primary || 'ج.س');
    const parts = n.toLocaleString('en-US',{maximumFractionDigits:2, minimumFractionDigits: n%1?2:0});
    return parts + ' ' + cur;
  },
  money2(n){ // secondary currency approx conversion
    if(!DB.settings.currency?.secondaryEnabled) return '';
    const rate = Number(DB.settings.currency.rate)||1;
    if(!rate) return '';
    const v = (Number(n)||0) / rate;
    return '≈ ' + v.toLocaleString('en-US',{maximumFractionDigits:2}) + ' ' + (DB.settings.currency.secondary||'USD');
  },
  compressImage(file, maxW=800, quality=0.72){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if(w > maxW){ h = Math.round(h * (maxW/w)); w = maxW; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  },
  toast(msg, type=''){
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2400);
  },
  toastAction(msg, actionLabel, actionFn){
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = 'toast';
    el.style.pointerEvents = 'auto';
    el.style.display = 'flex'; el.style.alignItems='center'; el.style.gap='12px';
    el.innerHTML = `<span style="flex:1;">${U.esc(msg)}</span><span style="color:var(--gold);font-weight:600;cursor:pointer;white-space:nowrap;" data-undo>${U.esc(actionLabel)}</span>`;
    wrap.appendChild(el);
    let done = false;
    el.querySelector('[data-undo]').addEventListener('click', ()=>{ if(done) return; done=true; actionFn(); el.remove(); });
    setTimeout(()=>{ if(done) return; el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 6000);
  },
  vibrate(ms){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} },
  qs(sel,root){ return (root||document).querySelector(sel); },
  qsa(sel,root){ return Array.from((root||document).querySelectorAll(sel)); },
  downloadFile(filename, content, mime='application/json'){
    const blob = new Blob([content], {type:mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 500);
  }
};

/* ---------------- Number to Arabic words (for receipts) ---------------- */
const ArabicNumber = (function(){
  const ones = ['', 'واحد', 'اثنان', 'ثلاثة', 'أربعة', 'خمسة', 'ستة', 'سبعة', 'ثمانية', 'تسعة'];
  const onesF = ['', 'إحدى', 'اثنتان', 'ثلاث', 'أربع', 'خمس', 'ست', 'سبع', 'ثماني', 'تسع'];
  const teens = ['عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
  const tens = ['', '', 'عشرون', 'ثلاثون', 'أربعون', 'خمسون', 'ستون', 'سبعون', 'ثمانون', 'تسعون'];
  const hundreds = ['', 'مائة', 'مئتان', 'ثلاثمائة', 'أربعمائة', 'خمسمائة', 'ستمائة', 'سبعمائة', 'ثمانمائة', 'تسعمائة'];
  const scales = [
    {v:1000000000, s:'مليار', p:'ملياران', pl:'مليارات'},
    {v:1000000, s:'مليون', p:'مليونان', pl:'ملايين'},
    {v:1000, s:'ألف', p:'ألفان', pl:'آلاف'}
  ];
  function threeDigits(n){
    let parts = [];
    const h = Math.floor(n/100), rem = n%100;
    if(h) parts.push(hundreds[h]);
    if(rem){
      if(rem < 10) parts.push(ones[rem]);
      else if(rem < 20) parts.push(teens[rem-10]);
      else {
        const t = Math.floor(rem/10), o = rem%10;
        if(o) parts.push(ones[o] + ' و' + tens[t]);
        else parts.push(tens[t]);
      }
    }
    return parts.join(' و');
  }
  function convert(num){
    num = Math.floor(Math.abs(num));
    if(num === 0) return 'صفر';
    let words = [];
    let n = num;
    for(const sc of scales){
      const count = Math.floor(n / sc.v);
      if(count){
        if(count === 1) words.push(sc.s);
        else if(count === 2) words.push(sc.p);
        else if(count >= 3 && count <= 10) words.push(threeDigits(count) + ' ' + sc.pl);
        else words.push(threeDigits(count) + ' ' + sc.s);
        n = n % sc.v;
      }
    }
    if(n) words.push(threeDigits(n));
    return words.join(' و');
  }
  function amountToWords(amount, currency){
    amount = Number(amount)||0;
    const whole = Math.floor(amount);
    const fraction = Math.round((amount - whole) * 100);
    const cur = currency || (window.DB ? (DB.settings.currency?.primary || 'جنيه سوداني') : 'جنيه سوداني');
    let result = convert(whole) + ' ' + cur + ' فقط لا غير';
    if(fraction > 0){
      result = convert(whole) + ' ' + cur + ' و' + convert(fraction) + ' قرش، فقط لا غير';
    }
    return result;
  }
  return { convert, amountToWords };
})();

/* ---------------- Database Layer ---------------- */
const DB_KEY = 'aqari_pro_db_v1';

function seedDB(){
  const propId = U.uid('prop');
  const units = ['الأرضي - يسار','الأول - يمين','الأول - يسار','الثاني - يمين','الثاني - يسار'].map((name,i)=>({
    id: U.uid('unit'),
    propertyId: propId,
    name,
    type:'شقة مفروشة',
    status:'available',
    floor: i===0?'أرضي':(i<=2?'الأول':'الثاني'),
    rooms: 2, bathrooms:1, area:'',
    notes:''
  }));
  return {
    version: 1,
    properties: [{
      id: propId, name:'المبنى الرئيسي', type:'سكني', city:'', district:'', address:'',
      floorsCount:3, area:'', coverImage:'', createdAt:U.now()
    }],
    units,
    tenants: [],
    contracts: [],
    payments: [],
    maintenance: [],
    expenses: [],
    revenues: [],
    auditLog: [{id:U.uid('log'), at:U.now(), action:'تهيئة', detail:'تم إنشاء بيانات المبنى الرئيسي بخمس شقق مفروشة'}],
    settings: {
      onboarded:false,
      orgName:'المبنى الرئيسي',
      owner:{ name:'', idNumber:'', address:'', phone:'' },
      security:{ pinEnabled:false, pin:'' },
      currency:{ primary:'ج.س', secondaryEnabled:false, secondary:'USD', rate:'' },
      role:'owner',
      receiptCounter: 0,
      contractCounter: 0,
      theme:'dark'
    }
  };
}

let DB = null;

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(raw){ DB = JSON.parse(raw); }
    else { DB = seedDB(); saveDB(); }
  }catch(e){
    console.error('DB load failed', e);
    DB = seedDB();
  }
  // migrate missing fields defensively
  DB.properties = DB.properties||[]; DB.units = DB.units||[]; DB.tenants = DB.tenants||[];
  DB.contracts = DB.contracts||[]; DB.payments = DB.payments||[]; DB.maintenance = DB.maintenance||[];
  DB.expenses = DB.expenses||[]; DB.revenues = DB.revenues||[]; DB.auditLog = DB.auditLog||[];
  DB.settings = DB.settings || {};
  DB.settings.currency = DB.settings.currency || {primary:'ج.س', secondaryEnabled:false, secondary:'USD', rate:''};
  DB.settings.owner = DB.settings.owner || {name:'',idNumber:'',address:'',phone:''};
  DB.settings.security = DB.settings.security || {pinEnabled:false,pin:''};
}

function saveDB(){
  try{
    localStorage.setItem(DB_KEY, JSON.stringify(DB));
    return true;
  }catch(e){
    console.error('DB save failed', e);
    U.toast('فشل الحفظ! قد تكون مساحة التخزين ممتلئة', 'error');
    return false;
  }
}

function logAction(action, detail){
  DB.auditLog.unshift({id:U.uid('log'), at:U.now(), action, detail: detail||''});
  if(DB.auditLog.length > 500) DB.auditLog.length = 500;
}

/* getters helpers */
const Q = {
  property(id){ return DB.properties.find(p=>p.id===id); },
  unit(id){ return DB.units.find(u=>u.id===id); },
  unitsOfProperty(pid){ return DB.units.filter(u=>u.propertyId===pid); },
  tenant(id){ return DB.tenants.find(t=>t.id===id); },
  contract(id){ return DB.contracts.find(c=>c.id===id); },
  contractsOfUnit(uid){ return DB.contracts.filter(c=>c.unitId===uid); },
  contractsOfTenant(tid){ return DB.contracts.filter(c=>c.tenantId===tid); },
  activeContractOfUnit(uid){ return DB.contracts.find(c=>c.unitId===uid && c.status==='active'); },
  paymentsOfContract(cid){ return DB.payments.filter(p=>p.contractId===cid).sort((a,b)=>a.dueDate<b.dueDate?-1:1); },
  maintenanceOfUnit(uid){ return DB.maintenance.filter(m=>m.unitId===uid); },
  statusLabel(s){ return {available:'متاحة',rented:'مؤجرة',reserved:'محجوزة',maintenance:'صيانة'}[s]||s; },
  statusIcon(s){ return {available:'🟢',rented:'🔴',reserved:'🟡',maintenance:'⚫'}[s]||'⚪'; },
  payStatus(p){
    const paid = Number(p.paidAmount)||0, due = Number(p.amount)||0;
    if(paid >= due && due>0) return 'paid';
    if(paid > 0 && paid < due) return 'partial';
    if(new Date(p.dueDate) < new Date(U.today())) return 'late';
    return 'due';
  },
  payStatusLabel(s){ return {paid:'مدفوع',partial:'جزئي',due:'مستحق',late:'متأخر'}[s]||s; }
};

/* ---------------- Modal engine ---------------- */
const Modal = {
  open(html, opts={}){
    const root = document.getElementById('modal-root');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay' + (opts.center?' center':'');
    overlay.innerHTML = `
      <div class="modal-sheet" role="dialog">
        ${opts.center?'':'<div class="modal-handle"></div>'}
        <div class="modal-header">
          <div class="modal-title">${opts.title||''}</div>
          <div class="modal-close" data-close="1">✕</div>
        </div>
        <div class="modal-body">${html}</div>
      </div>`;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) Modal.close(); });
    overlay.querySelector('[data-close]').addEventListener('click', Modal.close);
    root.appendChild(overlay);
    document.body.style.overflow='hidden';
    return overlay;
  },
  close(){
    const root = document.getElementById('modal-root');
    root.innerHTML = '';
    document.body.style.overflow='';
  },
  confirm(msg, onYes, title='تأكيد'){
    const el = Modal.open(`
      <p style="color:var(--text-dim); font-size:14px; line-height:1.8; margin:0 0 18px;">${U.esc(msg)}</p>
      <div class="btn-row">
        <button class="btn ghost" data-cancel>إلغاء</button>
        <button class="btn danger" data-yes>تأكيد</button>
      </div>
    `, {title, center:true});
    el.querySelector('[data-yes]').addEventListener('click', ()=>{ Modal.close(); onYes(); });
    el.querySelector('[data-cancel]').addEventListener('click', Modal.close);
  }
};

  showLock(){
    document.getElementById('main-root').classList.add('hidden');

    let entered = '';
    const draw = ()=>{
      root.innerHTML = `
        <div class="pin-screen">
          <div class="welcome-logo" style="width:70px;height:70px;font-size:30px;margin-bottom:10px;">ع</div>
          <div style="font-family:var(--font-display); font-size:20px; font-weight:600;">أدخل رمز القفل</div>

          <div class="pin-pad">
            ${[1,2,3,4,5,6,7,8,9].map(n=>`<div class="pin-key" data-k="${n}">${n}</div>`).join('')}
            <div class="pin-key" data-k="clear" style="font-size:13px;">مسح</div>
            <div class="pin-key" data-k="0">0</div>
            <div class="pin-key" data-k="del">⌫</div>
          </div>
        </div>`;
      U.qsa('.pin-key', root).forEach(k=>{
        k.addEventListener('click', ()=>{
          const key = k.dataset.k;
          if(key==='clear'){ entered=''; }
          else if(key==='del'){ entered = entered.slice(0,-1); }
          else if(entered.length<4){ entered += key; }
          if(entered.length===4){
            if(entered === DB.settings.security.pin){
              root.innerHTML=''; App.showMain();
            } else {
              U.vibrate(200);
              U.toast('رمز غير صحيح','error');
              entered='';
              draw();
            }
          } else draw();
        });
      });
    };
    draw();
  },

  showMain(){
    document.getElementById('welcome-root').innerHTML='';

          </div>

  storageUsageHtml(){
    let bytes = 0;
    try{ bytes = new Blob([localStorage.getItem(DB_KEY)||'']).size; }catch(e){ bytes = (JSON.stringify(DB)||'').length; }
    const kb = bytes/1024, capKB = 5*1024; // ~5MB conservative cap

/* ---------------- Screens ---------------- */
const Screens = {
  go(route, param, fromBack){
    const topLevel = ['dashboard','properties','contracts','payments','more'];
    if(!fromBack){
      if(topLevel.includes(route)){
        App._stack = [];
      } else if(App.route){
        App._stack.push({route:App.route, param:App.routeParam});
      }
    }
    App.route = route; App.routeParam = param;
    const main = ['dashboard','properties','contracts','payments'].includes(route) ? route : null;
    App.setActiveNav(main);
    const content = document.getElementById('app-content');
    const fab = document.getElementById('fab-add');
    fab.classList.add('hidden');
    fab.onclick = null;
    window.scrollTo(0,0);
    const backBtn = document.getElementById('back-btn');
    if(backBtn) backBtn.classList.toggle('hidden', App._stack.length===0);
    const fn = this['render_'+route.replace(/-/g,'_')];
    if(fn) fn.call(this, content, param);
    else content.innerHTML = `<div class="empty-state">صفحة غير موجودة</div>`;
  },

  back(){
    const prev = App._stack.pop();
    if(prev) Screens.go(prev.route, prev.param, true);
    else Screens.go('dashboard');
  },

    const soon = DB.contracts.filter(c=>c.status==='active' && c.endDate && U.daysBetween(U.today(), c.endDate) <= 30 && U.daysBetween(U.today(), c.endDate) >= 0);

      </div>

        <div class="card-row"><span class="muted" style="font-size:12.5px;">إجمالي الإيرادات</span><span class="stat-num" style="font-size:16px;color:var(--green)">${U.money(totalRevenue)}</span></div>
        <div class="divider" style="margin:8px 0;"></div>
        <div class="card-row"><span class="muted" style="font-size:12.5px;">إجمالي المصروفات</span><span class="stat-num" style="font-size:16px;color:var(--red)">${U.money(totalExpenses)}</span></div>
        ${DB.settings.currency?.secondaryEnabled?`<div class="muted" style="font-size:11px;margin-top:6px;">${U.money2(totalRevenue-totalExpenses)}</div>`:''}
      </div>

      ${(soon.length||latePayments.length||openMaint.length) ? `
      <div class="section-title" style="font-size:17px;">🔔 تنبيهات</div>
      ${soon.map(c=>{
        const u = Q.unit(c.unitId), t = Q.tenant(c.tenantId);
        return `<div class="card" data-open-contract="${c.id}"><div class="card-row">
          <span style="font-size:13px;">عقد ${U.esc(u?.name||'')} — ${U.esc(t?.name||'')}</span>
          <span class="chip st-reserved">ينتهي بعد ${U.daysBetween(U.today(),c.endDate)} يوم</span>

    const contracts = Q.contractsOfTenant(t.id);
    el.innerHTML = `
      <div class="section-title">${U.esc(t.name)}</div>
      <div class="card">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px;">

      <input type="file" id="doc-file" accept="image/*,.pdf" class="hidden">
      <button class="btn ghost sm" id="add-doc" style="margin-top:8px;">+ إضافة مستند (هوية، عقد عمل...)</button>
    `;
    t.tenantDocuments = t.tenantDocuments||[];
    const dl = el.querySelector('#doc-list');
    function drawDocs(){
      dl.innerHTML = t.tenantDocuments.length ? t.tenantDocuments.map((d,i)=>`
        <div class="card" style="padding:10px 12px;">
          <div class="card-row">
            <span style="font-size:13px;">📄 ${U.esc(d.name)}</span>
            <span style="display:flex;gap:8px;">
              <span data-view="${i}" style="cursor:pointer;color:var(--purple);font-size:12px;">عرض</span>
              <span data-rm="${i}" style="cursor:pointer;color:var(--red);font-size:12px;">حذف</span>
            </span>
          </div>
        </div>`).join('') : `<div class="muted" style="font-size:12.5px;">لا مستندات مرفوعة</div>`;
      U.qsa('[data-view]', dl).forEach(x=>x.addEventListener('click',()=>window.open(t.tenantDocuments[x.dataset.view].data,'_blank')));
      U.qsa('[data-rm]', dl).forEach(x=>x.addEventListener('click',()=>{
        t.tenantDocuments.splice(Number(x.dataset.rm),1); saveDB(); drawDocs(); U.toast('تم الحذف','success');
      }));
    }
    drawDocs();
    el.querySelector('#add-doc').addEventListener('click',()=>el.querySelector('#doc-file').click());
    el.querySelector('#doc-file').addEventListener('change', async (e)=>{
      const f = e.target.files[0]; if(!f) return;
      if(f.size > 3*1024*1024){ U.toast('الملف كبير جداً (الحد 3 ميجابايت)','error'); return; }
      let dataUrl;
      if(f.type.startsWith('image/')) dataUrl = await U.compressImage(f, 1000, 0.75);
      else dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); });
      t.tenantDocuments.push({name:f.name, data:dataUrl, addedAt:U.now()});
      logAction('إضافة مستند مستأجر', t.name+': '+f.name);
      saveDB(); drawDocs(); U.toast('تمت الإضافة','success');
    });
    const cl = el.querySelector('#tc-list');
    if(!contracts.length) cl.innerHTML = `<div class="muted" style="font-size:12.5px;">لا توجد عقود</div>`;
    else cl.innerHTML = contracts.map(c=>{
      const u = Q.unit(c.unitId);
      return `<div class="card" data-c="${c.id}" style="cursor:pointer;">
        <div class="card-row">
          <span>${U.esc(u?.name||'—')}</span>

        </div>
      </div>`;
    }).join('');
    U.qsa('[data-c]', cl).forEach(c=>c.addEventListener('click',()=>Screens.go('contract-detail', c.dataset.c)));
    el.querySelector('[data-edit]').addEventListener('click',()=>Forms.tenant(t.id));
    el.querySelector('[data-del]').addEventListener('click',()=>{
      Modal.confirm('سيتم حذف المستأجر (لن يتم حذف عقوده). متابعة؟', ()=>{
        Actions.undoableDelete('تم حذف المستأجر', ()=>{
          DB.tenants = DB.tenants.filter(x=>x.id!==t.id);
          logAction('حذف مستأجر', t.name);
        }, 'tenants');
      });
    });
    if(t.phone) el.querySelector('[data-wa]').addEventListener('click',()=>Actions.whatsapp(t.phone, `مرحباً ${t.name}،`));
  },

    el.innerHTML = `
      <div class="section-title">الدفعات <small>${DB.payments.length}</small></div>

      <div class="tabs">

          `<div class="tab ${tab===k?'active':''}" data-tab="${k}">${l}</div>`).join('')}
      </div>
      <div id="p-list"></div>
    `;
    el.querySelector('#p-search').addEventListener('input', e=>{ App._paymentQuery = e.target.value; Screens.go('payments'); });
    U.qsa('[data-tab]', el).forEach(tb=>tb.addEventListener('click',()=>{ App._paymentsTab = tb.dataset.tab; Screens.go('payments'); }));
    let list = DB.payments.slice().sort((a,b)=>a.dueDate<b.dueDate?-1:1);
    if(tab!=='all') list = list.filter(p=>Q.payStatus(p)===tab);
    if(q) list = list.filter(p=>{
      const c = Q.contract(p.contractId), t = c?Q.tenant(c.tenantId):null, u = c?Q.unit(c.unitId):null;
      return ((t?.name||'')+' '+(u?.name||'')).toLowerCase().includes(q);
    });
    const pl = el.querySelector('#p-list');
    if(!list.length){ pl.innerHTML = `<div class="empty-state"><div class="ic">💰</div><div class="t">لا توجد دفعات</div></div>`; return; }
    pl.innerHTML = list.map(p=>{
      const c = Q.contract(p.contractId), t = c?Q.tenant(c.tenantId):null, u = c?Q.unit(c.unitId):null;
      const st = Q.payStatus(p);
      return `<div class="list-item" data-p="${p.id}">

          <div class="list-title">${U.esc(t?.name||'—')} — ${U.esc(u?.name||'')}</div>

          <span class="chip st-${st}" style="margin-top:4px;">${Q.payStatusLabel(st)}</span>
        </div>
      </div>`;
    }).join('');
    U.qsa('[data-p]', pl).forEach(row=>row.addEventListener('click',()=>Forms.payment(row.dataset.p)));

  /* ---------- Receipt generator tool ---------- */
  render_receipt_tool(el){
    const r = App._receiptDraft || {
      id:null, receiptNo: null, date:U.today(),
      payerName:'', payerId:'', amount:'', amountWords:'', reason:'',
      rentSection:false, propertyName:'', unitName:'', monthlyRent:'', remaining:'',
      contractId:''
    };
    App._receiptDraft = r;
    const contractOptions = DB.contracts.map(c=>{
      const t=Q.tenant(c.tenantId), u=Q.unit(c.unitId);
      return `<option value="${c.id}" ${r.contractId===c.id?'selected':''}>${U.esc(t?.name||'')} — ${U.esc(u?.name||'')}</option>`;
    }).join('');
    el.innerHTML = `
      <div class="section-title">🧾 إيصال استلام مبلغ</div>
      <div class="card">
        <div class="field">
          <label>تعبئة تلقائية من عقد موجود (اختياري)</label>
          <select id="rc-contract"><option value="">— بدون —</option>${contractOptions}</select>
        </div>
        <div class="field-row">
          <div class="field"><label>رقم الإيصال</label><input id="rc-no" value="${r.receiptNo || 'سيتم توليده تلقائياً'}" disabled></div>
          <div class="field"><label>التاريخ</label><input type="date" id="rc-date" value="${r.date}"></div>
        </div>
        <div class="field"><label>استُلم من (اسم الدافع)</label><input id="rc-payer" value="${U.esc(r.payerName)}"></div>
        <div class="field"><label>رقم الهوية</label><input id="rc-payer-id" value="${U.esc(r.payerId)}"></div>
        <div class="field"><label>المبلغ</label><input id="rc-amount" type="number" inputmode="decimal" value="${r.amount}"></div>
        <div class="field"><label>وذلك مقابل</label><textarea id="rc-reason" placeholder="مثال: إيجار شهر يوليو 2026 لوحدة الأول-يمين">${U.esc(r.reason)}</textarea></div>
        <div class="checkbox-row" style="margin-bottom:10px;"><input type="checkbox" id="rc-rent-toggle" ${r.rentSection?'checked':''}><label for="rc-rent-toggle">إضافة قسم بيانات الإيجار</label></div>
        <div id="rc-rent-fields" class="${r.rentSection?'':'hidden'}">
          <div class="field-row">
            <div class="field"><label>العقار</label><input id="rc-prop" value="${U.esc(r.propertyName)}"></div>
            <div class="field"><label>الوحدة</label><input id="rc-unit" value="${U.esc(r.unitName)}"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>الإيجار الشهري</label><input id="rc-monthly" type="number" value="${r.monthlyRent}"></div>
            <div class="field"><label>المتبقي</label><input id="rc-remaining" type="number" value="${r.remaining}"></div>
          </div>
        </div>
      </div>

      <div class="section-title" style="font-size:16px;">معاينة حية</div>
      <div id="rc-preview" class="card" style="background:#fff;color:#111;"></div>

      <div class="btn-row" style="margin-top:12px;">
        <button class="btn gold" id="rc-print">🖨️ طباعة / حفظ PDF</button>
      </div>
    `;
    const inputs = ['rc-date','rc-payer','rc-payer-id','rc-amount','rc-reason','rc-prop','rc-unit','rc-monthly','rc-remaining'];
    const sync = ()=>{
      r.date = el.querySelector('#rc-date').value;
      r.payerName = el.querySelector('#rc-payer').value;
      r.payerId = el.querySelector('#rc-payer-id').value;
      r.amount = el.querySelector('#rc-amount').value;
      r.reason = el.querySelector('#rc-reason').value;
      r.rentSection = el.querySelector('#rc-rent-toggle').checked;
      r.propertyName = el.querySelector('#rc-prop').value;
      r.unitName = el.querySelector('#rc-unit').value;
      r.monthlyRent = el.querySelector('#rc-monthly').value;
      r.remaining = el.querySelector('#rc-remaining').value;
      el.querySelector('#rc-rent-fields').classList.toggle('hidden', !r.rentSection);
      renderPreview();
    };
    function renderPreview(){
      const words = r.amount ? ArabicNumber.amountToWords(r.amount) : '—';
      el.querySelector('#rc-preview').innerHTML = Documents.receiptHtmlBody(r, words, true);
    }
    inputs.forEach(id=>{ const n=el.querySelector('#'+id); if(n) n.addEventListener('input', sync); });
    el.querySelector('#rc-rent-toggle').addEventListener('change', sync);
    el.querySelector('#rc-contract').addEventListener('change', (e)=>{
      const c = Q.contract(e.target.value);
      if(!c){ r.contractId=''; sync(); return; }
      const t=Q.tenant(c.tenantId), u=Q.unit(c.unitId), p=u?Q.property(u.propertyId):null;
      r.contractId = c.id;
      r.payerName = t?.name||''; r.payerId = t?.idNumber||'';
      r.rentSection = true;
      r.propertyName = p?.name||''; r.unitName = u?.name||'';
      r.monthlyRent = c.rentAmount||'';
      const pays = Q.paymentsOfContract(c.id);
      const remaining = pays.reduce((s,p)=>s+ (Number(p.amount)-Number(p.paidAmount||0)),0);
      r.remaining = remaining>0?remaining:0;
      r.amount = c.rentAmount||'';
      r.reason = `إيجار وحدة ${u?.name||''} — ${p?.name||''}`;
      Screens.go('receipt-tool');
    });
    renderPreview();
    el.querySelector('#rc-print').addEventListener('click',()=>{
      if(!r.payerName || !r.amount){ U.toast('أدخل اسم الدافع والمبلغ على الأقل','error'); return; }
      if(!r.receiptNo){
        DB.settings.receiptCounter = (DB.settings.receiptCounter||0)+1;
        r.receiptNo = 'REC-' + String(DB.settings.receiptCounter).padStart(4,'0');
        logAction('إصدار إيصال', r.receiptNo);
        saveDB();
      }
      Documents.printReceipt(r);
      App._receiptDraft = null;
    });
  },

        <div class="field"><label>هاتف المالك</label><input id="s-owner-phone" value="${U.esc(s.owner.phone)}"></div>
        <div class="field">
          <label>الدور الحالي (شكلي فقط)</label>
          <select id="s-role">
            ${[['owner','👑 مالك'],['accountant','💰 محاسب'],['manager','🗝️ مدير'],['assistant','🧾 مساعد']].map(([k,l])=>`<option value="${k}" ${s.role===k?'selected':''}>${l}</option>`).join('')}
          </select>
          <small class="hint">تنبيه: اختيار الدور شكلي فقط ولا يمنع فعلياً أي عملية في هذا التطبيق.</small>
        </div>
        <button class="btn primary sm" id="save-org">حفظ</button>
      </div>

      <div class="card">
        <b style="font-size:14px;">💱 العملة</b>
        <div class="field" style="margin-top:10px;"><label>العملة الأساسية</label><input id="s-cur-primary" value="${U.esc(s.currency.primary)}"></div>
        <div class="checkbox-row" style="margin:10px 0;"><input type="checkbox" id="s-cur-toggle" ${s.currency.secondaryEnabled?'checked':''}><label for="s-cur-toggle">تفعيل عملة ثانية (تحويل تقريبي)</label></div>
        <div id="s-cur-fields" class="field-row ${s.currency.secondaryEnabled?'':'hidden'}">
          <div class="field"><label>رمز العملة الثانية</label><input id="s-cur-secondary" value="${U.esc(s.currency.secondary)}"></div>
          <div class="field"><label>سعر الصرف (1 ثانية = كم أساسية)</label><input id="s-cur-rate" type="number" value="${U.esc(s.currency.rate)}"></div>
        </div>
        <button class="btn primary sm" id="save-currency">حفظ</button>
      </div>

      <div class="card">
        <b style="font-size:14px;">🔒 الأمان</b>
        <div class="checkbox-row" style="margin:10px 0;"><input type="checkbox" id="s-pin-toggle" ${s.security.pinEnabled?'checked':''}><label for="s-pin-toggle">تفعيل قفل PIN محلي (4 أرقام)</label></div>
        <small class="hint" style="margin-bottom:10px;display:block;">تنبيه: هذا قفل محلي بسيط فقط وليس تشفيراً حقيقياً — أي وصول لملفات الجهاز يتجاوزه.</small>
        <div id="s-pin-fields" class="${s.security.pinEnabled?'':'hidden'}">
          <div class="field"><label>رمز PIN (4 أرقام)</label><input id="s-pin-val" maxlength="4" inputmode="numeric" value="${U.esc(s.security.pin)}"></div>
        </div>
        <button class="btn primary sm" id="save-security">حفظ</button>
      </div>

      <div class="card">
        <b style="font-size:14px;">💾 النسخ الاحتياطي</b>
        <p class="muted" style="font-size:12px;line-height:1.8;margin:8px 0;">
          يُنصح بتصدير نسخة أسبوعياً. لا يوجد نسخ احتياطي تلقائي.
          ${s.lastBackupAt?`<br>آخر نسخة: ${U.fmtDate(s.lastBackupAt)} (منذ ${U.daysBetween(s.lastBackupAt,U.today())} يوم)`:'<br>لم يتم التصدير بعد.'}
        </p>
        <div class="btn-row">
          <button class="btn gold sm" id="export-backup" style="flex:1;">تصدير JSON</button>
          <button class="btn ghost sm" id="import-backup" style="flex:1;">استيراد JSON</button>
        </div>
        <input type="file" id="import-file" accept="application/json" class="hidden">
      </div>

      ${App.storageUsageHtml()}

      <div class="card">
        <b style="font-size:14px;">📥 استيراد CSV بالجملة</b>
        <p class="muted" style="font-size:12px;line-height:1.8;margin:8px 0;">استيراد مستأجرين أو وحدات من ملف CSV. الصف الأول عناوين الأعمدة.</p>
        <div class="field"><label>النوع</label><select id="csv-type"><option value="tenants">مستأجرون (name,phone,idNumber,employer)</option><option value="units">وحدات (name,type,rooms) — لأول عقار</option></select></div>
        <input type="file" id="csv-file" accept=".csv" class="hidden">
        <button class="btn ghost sm" id="csv-pick">اختيار ملف CSV</button>
      </div>

      <div class="card">
        <b style="font-size:14px;">⚠️ حدود معروفة بصراحة</b>
        <ul class="muted" style="font-size:11.5px;line-height:2;padding-right:18px;margin:8px 0 0;">
          <li>لا خادم حقيقي: كل جهاز له نسخة بيانات مستقلة، بلا مزامنة</li>
          <li>قفل PIN حماية محلية بسيطة فقط</li>
          <li>الأدوار شكلية ولا تمنع أي عملية فعلياً</li>
          <li>سعة التخزين المحلي محدودة (~5-10 ميجابايت)</li>
          <li>لا تحديث تلقائي لحالة الوحدة عند فسخ العقد يدوياً</li>
          <li>العقد نموذج مساعد، ويحتاج مراجعة قانونية قبل الاعتماد</li>
        </ul>
      </div>
      <div class="text-center muted" style="font-size:11px;margin-top:6px;">عقاري — تطبيق محلي بالكامل، لا يتصل بأي خادم.</div>
    `;
    el.querySelector('#save-org').addEventListener('click',()=>{
      s.orgName = el.querySelector('#s-org').value.trim() || 'عقاري';
      s.owner.name = el.querySelector('#s-owner-name').value;
      s.owner.idNumber = el.querySelector('#s-owner-id').value;
      s.owner.address = el.querySelector('#s-owner-address').value;
      s.owner.phone = el.querySelector('#s-owner-phone').value;
      s.role = el.querySelector('#s-role').value;
      saveDB(); U.toast('تم الحفظ','success');
      document.getElementById('org-name-label').textContent = s.orgName;
      const roleMap = {owner:'👑 مالك', accountant:'💰 محاسب', manager:'🗝️ مدير', assistant:'🧾 مساعد'};
      document.getElementById('role-badge').textContent = roleMap[s.role]||'👑 مالك';
    });
    el.querySelector('#s-cur-toggle').addEventListener('change', e=>{
      el.querySelector('#s-cur-fields').classList.toggle('hidden', !e.target.checked);
    });
    el.querySelector('#save-currency').addEventListener('click',()=>{
      s.currency.primary = el.querySelector('#s-cur-primary').value || 'ج.س';
      s.currency.secondaryEnabled = el.querySelector('#s-cur-toggle').checked;
      s.currency.secondary = el.querySelector('#s-cur-secondary').value || 'USD';
      s.currency.rate = el.querySelector('#s-cur-rate').value;
      saveDB(); U.toast('تم الحفظ','success');
    });
    el.querySelector('#s-pin-toggle').addEventListener('change', e=>{
      el.querySelector('#s-pin-fields').classList.toggle('hidden', !e.target.checked);
    });
    el.querySelector('#save-security').addEventListener('click',()=>{
      const enabled = el.querySelector('#s-pin-toggle').checked;
      const pin = el.querySelector('#s-pin-val') ? el.querySelector('#s-pin-val').value : '';
      if(enabled && !/^\d{4}$/.test(pin)){ U.toast('أدخل رمز PIN من 4 أرقام','error'); return; }
      s.security.pinEnabled = enabled;
      s.security.pin = pin;
      saveDB(); U.toast('تم الحفظ','success');
    });
    el.querySelector('#export-backup').addEventListener('click',()=>{
      U.downloadFile(`aqari-backup-${U.today()}.json`, JSON.stringify(DB, null, 2));
      s.lastBackupAt = U.today();
      logAction('تصدير نسخة احتياطية'); saveDB();
      U.toast('تم تصدير النسخة الاحتياطية','success');
      Screens.go('settings');
    });
    el.querySelector('#import-backup').addEventListener('click',()=>el.querySelector('#import-file').click());
    el.querySelector('#import-file').addEventListener('change', (e)=>{
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const data = JSON.parse(reader.result);
          Modal.confirm('سيتم استبدال جميع البيانات الحالية بالنسخة المستوردة. متابعة؟', ()=>{
            DB = data; saveDB(); U.toast('تم الاستيراد بنجاح','success'); Screens.go('settings');
          }, 'استيراد نسخة احتياطية');
        }catch(err){ U.toast('ملف غير صالح','error'); }
      };
      reader.readAsText(file);
    });
    el.querySelector('#csv-pick').addEventListener('click',()=>el.querySelector('#csv-file').click());
    el.querySelector('#csv-file').addEventListener('change', (e)=>{
      const file = e.target.files[0]; if(!file) return;
      const type = el.querySelector('#csv-type').value;
      const reader = new FileReader();
      reader.onload = ()=>{
        const count = Actions.importCSV(reader.result, type);
        U.toast(`تم استيراد ${count} سجل`, 'success');
        Screens.go('settings');
      };
      reader.readAsText(file);
    });
  }
};

        if(newUnitId !== c.unitId){
          const conflict = DB.contracts.find(x=>x.id!==c.id && x.unitId===newUnitId && x.status==='active');

        if(oldRent !== rentAmount){
          const stepMonths = oldFreq==='yearly'?12:oldFreq==='quarterly'?3:1;

/* ---------------- Signature pad ---------------- */
const Signature = {
  open(c, field){
    const html = `
      <div class="sig-pad-wrap"><canvas id="sig-canvas" height="220"></canvas></div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn ghost sm" id="sig-clear" style="flex:1;">مسح</button>
        <button class="btn primary sm" id="sig-save" style="flex:1;">حفظ التوقيع</button>
      </div>
    `;
    const el = Modal.open(html, {title: field==='landlordSignature'?'توقيع المؤجر':'توقيع المستأجر'});
    const canvas = el.querySelector('#sig-canvas');
    canvas.width = canvas.offsetWidth;
    const ctx = canvas.getContext('2d');
    ctx.lineWidth = 2.4; ctx.lineCap='round'; ctx.strokeStyle='#111';
    let drawing = false, last = null;
    function pos(e){
      const r = canvas.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      return {x: p.clientX - r.left, y: p.clientY - r.top};
    }
    function start(e){ drawing=true; last=pos(e); e.preventDefault(); }
    function move(e){ if(!drawing) return; const p = pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; e.preventDefault(); }
    function end(){ drawing=false; }
    canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);
    el.querySelector('#sig-clear').addEventListener('click',()=>ctx.clearRect(0,0,canvas.width,canvas.height));
    el.querySelector('#sig-save').addEventListener('click',()=>{
      c[field] = canvas.toDataURL('image/png');
      saveDB(); Modal.close(); U.toast('تم حفظ التوقيع','success');
      Screens.go('contract-detail', c.id);
    });
  }
};

/* ---------------- Actions ---------------- */
const Actions = {
  snapshot(){ return JSON.parse(JSON.stringify(DB)); },
  undoableDelete(label, doDelete, afterRoute, afterParam){
    const snap = Actions.snapshot();
    doDelete();
    saveDB();
    U.toastAction(label, 'تراجع', ()=>{
      DB = snap; saveDB(); U.toast('تم التراجع','success'); Screens.go(afterRoute, afterParam);
    });
  },
  generatePaymentSchedule(c){
    const start = new Date(c.startDate), end = new Date(c.endDate);
    const stepMonths = c.paymentFrequency==='yearly'?12 : c.paymentFrequency==='quarterly'?3 : 1;
    const amountPerPeriod = Number(c.rentAmount) * stepMonths;
    let cursor = new Date(start.getFullYear(), start.getMonth(), Math.min(c.dueDay||1,28));
    if(cursor < start) cursor.setMonth(cursor.getMonth()+stepMonths);
    while(cursor <= end){
      DB.payments.push({
        id:U.uid('pay'), contractId:c.id, dueDate: cursor.toISOString().slice(0,10),
        amount: amountPerPeriod, paidAmount:0, method:''
      });
      cursor = new Date(cursor.getFullYear(), cursor.getMonth()+stepMonths, Math.min(c.dueDay||1,28));
    }
  },
  renewContract(c){
    Modal.confirm('سيتم إنشاء عقد جديد بنفس بيانات هذا العقد بدءاً من نهاية المدة الحالية، مع جدول دفعات جديد. متابعة؟', ()=>{
      const oldEnd = new Date(c.endDate);
      const newStart = new Date(oldEnd); newStart.setDate(newStart.getDate()+1);
      const durationDays = U.daysBetween(c.startDate, c.endDate);
      const newEnd = new Date(newStart); newEnd.setDate(newEnd.getDate()+durationDays);
      DB.settings.contractCounter = (DB.settings.contractCounter||0)+1;
      const contractNumber = 'CN-' + new Date().getFullYear() + '-' + String(DB.settings.contractCounter).padStart(3,'0');
      const verifyCode = Math.random().toString(36).slice(2,8).toUpperCase();
      const newC = {
        ...JSON.parse(JSON.stringify(c)),
        id:U.uid('con'), contractNumber, verifyCode, status:'active', createdAt:U.now(),
        startDate: newStart.toISOString().slice(0,10), endDate: newEnd.toISOString().slice(0,10),
        landlordSignature:'', tenantSignature:'', handoverIn:null, handoverOut:null
      };
      DB.contracts.push(newC);
      Actions.generatePaymentSchedule(newC);
      logAction('تجديد عقد', contractNumber+' من '+c.contractNumber);
      saveDB(); U.toast('تم تجديد العقد','success');
      Screens.go('contract-detail', newC.id);
    }, 'تجديد العقد');
  },
  deleteProperty(id, silent){
    const units = Q.unitsOfProperty(id).map(u=>u.id);
    DB.contracts = DB.contracts.filter(c=>{
      if(units.includes(c.unitId)){ DB.payments = DB.payments.filter(p=>p.contractId!==c.id); return false; }
      return true;
    });
    DB.units = DB.units.filter(u=>u.propertyId!==id);
    DB.maintenance = DB.maintenance.filter(m=>!units.includes(m.unitId));
    DB.properties = DB.properties.filter(p=>p.id!==id);
    logAction('حذف عقار');
    if(!silent){ saveDB(); U.toast('تم الحذف','success'); }
  },
  deleteUnit(id, silent){
    DB.contracts = DB.contracts.filter(c=>{
      if(c.unitId===id){ DB.payments = DB.payments.filter(p=>p.contractId!==c.id); return false; }
      return true;
    });
    DB.maintenance = DB.maintenance.filter(m=>m.unitId!==id);
    DB.units = DB.units.filter(u=>u.id!==id);
    logAction('حذف وحدة');
    if(!silent){ saveDB(); U.toast('تم الحذف','success'); }
  },
  whatsapp(phone, msg){
    const clean = String(phone).replace(/[^\d+]/g,'').replace(/^0/,'');
    const url = `https://wa.me/${clean}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  },
  remindPayment(p){
    const c = Q.contract(p.contractId), t = c?Q.tenant(c.tenantId):null, u = c?Q.unit(c.unitId):null;
    if(!t || !t.phone){ U.toast('لا يوجد رقم هاتف للمستأجر','error'); return; }
    const remaining = Number(p.amount) - Number(p.paidAmount||0);
    const msg = `تذكير ودّي: يوجد مبلغ مستحق قدره ${U.money(remaining)} عن وحدة ${u?.name||''} بتاريخ استحقاق ${U.fmtDate(p.dueDate)}. نأمل السداد في أقرب وقت ممكن. شكراً لتعاونكم.`;
    Actions.whatsapp(t.phone, msg);
  },
  exportFinanceCSV(){
    let rows = [['النوع','البند','المبلغ','التاريخ']];
    DB.revenues.forEach(r=>rows.push(['إيراد', r.category, r.amount, r.date]));
    DB.expenses.forEach(r=>rows.push(['مصروف', r.category, r.amount, r.date]));
    DB.payments.filter(p=>p.paidAmount>0).forEach(p=>rows.push(['دفعة إيجار', p.method||'', p.paidAmount, p.lastPaidAt||p.dueDate]));
    const csv = rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    U.downloadFile(`aqari-finance-${U.today()}.csv`, '\uFEFF'+csv, 'text/csv');
    U.toast('تم تصدير CSV','success');
  },
  importCSV(text, type){
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length < 2) return 0;
    const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
    let count = 0;
    for(let i=1;i<lines.length;i++){
      const cells = lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      const row = {}; headers.forEach((h,idx)=>row[h]=cells[idx]||'');
      if(type==='tenants' && row.name){
        DB.tenants.push({id:U.uid('ten'), name:row.name, phone:row.phone||'', idNumber:row.idNumber||'', employer:row.employer||'', email:'', passportNumber:'', address:'', photo:'', tenantDocuments:[], createdAt:U.now()});
        count++;
      } else if(type==='units' && row.name && DB.properties[0]){
        DB.units.push({id:U.uid('unit'), propertyId: DB.properties[0].id, name:row.name, type:row.type||'شقة', status:'available', floor:'', rooms:row.rooms||'', bathrooms:'', area:'', notes:''});
        count++;
      }
    }
    if(count){ logAction('استيراد CSV', `${count} سجل (${type})`); saveDB(); }
    return count;
  }
};

/* ---------------- Reports: canvas chart (no external libs) ---------------- */
const Reports = {
  drawChart(canvas){
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio||1;
    const w = canvas.clientWidth, h = canvas.clientHeight || 180;
    canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,w,h);

    const months = [];
    const now = new Date();
    for(let i=5;i>=0;i--){ const d = new Date(now.getFullYear(), now.getMonth()-i, 1); months.push(d); }
    const rev = months.map(()=>0), exp = months.map(()=>0);
    function monthIdx(dateStr){
      const d = new Date(dateStr); if(isNaN(d)) return -1;
      return months.findIndex(m=>m.getFullYear()===d.getFullYear() && m.getMonth()===d.getMonth());
    }
    DB.revenues.forEach(r=>{ const i=monthIdx(r.date); if(i>=0) rev[i]+=Number(r.amount||0); });
    DB.payments.filter(p=>p.paidAmount>0).forEach(p=>{ const i=monthIdx(p.lastPaidAt||p.dueDate); if(i>=0) rev[i]+=Number(p.paidAmount||0); });
    DB.expenses.forEach(e=>{ const i=monthIdx(e.date); if(i>=0) exp[i]+=Number(e.amount||0); });

    const maxVal = Math.max(1, ...rev, ...exp);
    const padL = 8, padB = 22, padT = 10, chartH = h - padB - padT;
    const groupW = (w - padL*2) / months.length;
    const barW = groupW*0.3;

    ctx.strokeStyle = '#e6e6ef'; ctx.lineWidth=1;
    for(let g=0; g<=3; g++){
      const y = padT + chartH - (chartH*g/3);
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w-padL, y); ctx.stroke();
    }
    months.forEach((m,i)=>{
      const x0 = padL + i*groupW + groupW*0.18;
      const rh = (rev[i]/maxVal)*chartH, eh = (exp[i]/maxVal)*chartH;
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(x0, padT+chartH-rh, barW, rh);
      ctx.fillStyle = '#f87171';
      ctx.fillRect(x0+barW+4, padT+chartH-eh, barW, eh);
      ctx.fillStyle = '#8a8fb5'; ctx.font = '10px IBM Plex Sans Arabic, sans-serif'; ctx.textAlign='center';
      ctx.fillText(m.toLocaleDateString('ar-EG',{month:'short'}), x0+barW+2, h-6);
    });
  }
};

/* ---------------- Boot ---------------- */
document.addEventListener('DOMContentLoaded', ()=>App.boot());

</script>
</body>
</html>
